<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Prediction</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>📚 Student Performance Predictor</h1>

        <p>Enter the student's details below to predict the result.</p>

        <div class="input-group">
            <label for="hours">Study Hours</label>
            <input type="number" id="hours" placeholder="Enter study hours">
        </div>

        <div class="input-group">
            <label for="attendance">Attendance (%)</label>
            <input type="number" id="attendance" placeholder="Enter attendance">
        </div>

        <button onclick="predict()">Predict</button>

        <div class="prediction-box">
            <h3>Prediction</h3>
            <h2 id="result">Waiting...</h2>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
